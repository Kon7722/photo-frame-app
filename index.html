<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写真フレーマー</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/photopea/UTIF.js/UTIF.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f17;
      --surface: #1a1a2e;
      --surface2: #20203a;
      --accent: #7c3aed;
      --accent-light: #a78bfa;
      --border: #2e2e50;
      --text: #e2e8f0;
      --text-dim: #8892a4;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 700; color: var(--accent-light); letter-spacing: -0.3px; }
    #photo-count { font-size: 12px; color: var(--text-dim); margin-left: auto; }

    /* ── Buttons ── */
    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: filter 0.15s, opacity 0.15s;
    }
    .btn:hover { filter: brightness(1.15); }
    .btn:disabled { opacity: 0.4; cursor: default; filter: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-success { background: #059669; color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 290px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Upload area ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 24px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface2);
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent-light);
      background: #1e1e38;
    }
    .upload-area .upload-icon { font-size: 28px; }
    .upload-area p { font-size: 12px; color: var(--text-dim); margin-top: 6px; line-height: 1.5; }

    /* ── Section cards ── */
    .section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .section h3 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* ── Fields ── */
    .field { margin-bottom: 9px; }
    .field:last-child { margin-bottom: 0; }
    .field > label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .field-row { display: flex; gap: 8px; align-items: center; }

    input[type="color"] {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      background: none;
      padding: 2px;
      flex-shrink: 0;
    }
    .color-hex {
      font-size: 11px;
      color: var(--text-dim);
      font-family: monospace;
    }

    input[type="number"] {
      width: 68px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 5px 7px;
      font-size: 13px;
      flex-shrink: 0;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent-light);
      cursor: pointer;
    }
    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    select option { background: #1a1a2e; }

    /* ── Format toggle ── */
    .format-group { display: flex; gap: 6px; }
    .fmt-btn {
      flex: 1;
      padding: 7px 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      transition: all 0.15s;
    }
    .fmt-btn span { display: block; font-size: 10px; opacity: 0.6; margin-top: 1px; }
    .fmt-btn.active {
      border-color: var(--accent-light);
      color: var(--accent-light);
      background: rgba(167,139,250,0.08);
    }

    /* ── Export row ── */
    .export-row { display: flex; gap: 8px; }
    .export-row .btn { flex: 1; }

    /* ── Content area ── */
    .content { flex: 1; overflow-y: auto; padding: 18px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text-dim);
    }
    .empty-state svg { opacity: 0.25; }
    .empty-state .main-msg { font-size: 15px; }
    .empty-state .sub-msg { font-size: 12px; opacity: 0.7; }

    /* ── Photo grid ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .photo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .photo-card .preview-img {
      width: 100%;
      display: block;
      min-height: 60px;
      background: #111;
    }
    .photo-card .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    .photo-card:hover .card-overlay { opacity: 1; }
    .photo-card .card-actions {
      position: absolute;
      top: 7px; left: 7px; right: 7px;
      display: flex;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .photo-card:hover .card-actions { opacity: 1; }
    .icon-btn {
      width: 26px; height: 26px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.18);
      color: #fff;
      backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.35); }
    .icon-btn.danger:hover { background: rgba(239,68,68,0.6); }
    .card-info {
      padding: 7px 9px;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-info .dim { color: #5a6070; }

    /* ── Progress overlay ── */
    .progress-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .progress-overlay.active { display: flex; }
    .progress-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 36px;
      text-align: center;
      min-width: 220px;
    }
    .progress-box p { margin-top: 12px; font-size: 13px; color: var(--text-dim); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  </style>
</head>
<body>

<header>
  <h1>&#x1F5BC; 写真フレーマー</h1>
  <span id="photo-count"></span>
</header>

<div class="main">

  <!-- ── Sidebar ── -->
  <div class="sidebar">

    <!-- Upload -->
    <div class="upload-area" id="upload-area">
      <div class="upload-icon">&#x1F4C2;</div>
      <p>クリック または ドラッグ&amp;ドロップ<br>で写真を追加（複数可）</p>
      <input type="file" id="file-input" accept="image/*,.tif,.tiff" multiple style="display:none">
    </div>

    <!-- Aspect ratio -->
    <div class="section">
      <h3>アスペクト比 / パディング</h3>
      <div class="field">
        <label>ターゲット比率</label>
        <select id="aspect-ratio">
          <option value="original">元のまま（パディングなし）</option>
          <option value="1:1">1:1 — 正方形</option>
          <option value="4:3">4:3 — 横</option>
          <option value="3:4">3:4 — 縦</option>
          <option value="3:2">3:2 — 横</option>
          <option value="2:3">2:3 — 縦</option>
          <option value="16:9">16:9 — 横ワイド</option>
          <option value="9:16">9:16 — 縦ワイド</option>
        </select>
      </div>
      <div class="field">
        <label>パディング色</label>
        <div class="field-row">
          <input type="color" id="padding-color" value="#ffffff">
          <span class="color-hex" id="padding-color-hex">#ffffff</span>
        </div>
      </div>
    </div>

    <!-- Inner border -->
    <div class="section">
      <h3>内側の枠線</h3>
      <div class="field">
        <label>色</label>
        <div class="field-row">
          <input type="color" id="inner-color" value="#000000">
          <span class="color-hex" id="inner-color-hex">#000000</span>
        </div>
      </div>
      <div class="field">
        <label>太さ: <span id="inner-size-label">30</span> px</label>
        <div class="field-row">
          <input type="range" id="inner-size" min="0" max="300" value="30">
          <input type="number" id="inner-size-num" min="0" max="1000" value="30">
        </div>
      </div>
    </div>

    <!-- Outer border -->
    <div class="section">
      <h3>外側の枠線</h3>
      <div class="field">
        <label>色</label>
        <div class="field-row">
          <input type="color" id="outer-color" value="#ffffff">
          <span class="color-hex" id="outer-color-hex">#ffffff</span>
        </div>
      </div>
      <div class="field">
        <label>太さ: <span id="outer-size-label">90</span> px</label>
        <div class="field-row">
          <input type="range" id="outer-size" min="0" max="300" value="90">
          <input type="number" id="outer-size-num" min="0" max="1000" value="90">
        </div>
      </div>
    </div>

    <!-- Export -->
    <div class="section">
      <h3>書き出し</h3>
      <div class="field">
        <label>フォーマット</label>
        <div class="format-group">
          <div class="fmt-btn active" data-fmt="png">PNG<span>可逆・高品質</span></div>
          <div class="fmt-btn" data-fmt="jpeg">JPEG<span>圧縮・軽量</span></div>
        </div>
      </div>
      <div class="field" id="quality-field" style="display:none">
        <label>品質: <span id="quality-label">95</span>%</label>
        <input type="range" id="quality" min="1" max="100" value="95">
      </div>
      <div class="export-row" style="margin-top:4px">
        <button class="btn btn-primary" id="btn-refresh">プレビュー更新</button>
        <button class="btn btn-success" id="btn-dl-all">全て保存</button>
      </div>
    </div>

    <button class="btn btn-ghost" id="btn-clear" style="width:100%;margin-top:auto">写真をクリア</button>

  </div><!-- /sidebar -->

  <!-- ── Content ── -->
  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p class="main-msg">写真をアップロードしてください</p>
      <p class="sub-msg">左のパネルから追加するか、ここにドロップしてください</p>
    </div>
    <div class="photo-grid" id="photo-grid" style="display:none"></div>
  </div>

</div><!-- /main -->

<!-- Progress overlay -->
<div class="progress-overlay" id="progress-overlay">
  <div class="progress-box">
    <div class="spinner"></div>
    <p id="progress-text">処理中...</p>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  images: [],   // { file, img }
  format: 'png',
};

// ── Settings ───────────────────────────────────────────────────────────────
function getSettings() {
  return {
    aspectRatio:  document.getElementById('aspect-ratio').value,
    paddingColor: document.getElementById('padding-color').value,
    innerColor:   document.getElementById('inner-color').value,
    innerSize:    Math.max(0, parseInt(document.getElementById('inner-size').value) || 0),
    outerColor:   document.getElementById('outer-color').value,
    outerSize:    Math.max(0, parseInt(document.getElementById('outer-size').value) || 0),
    format:       state.format,
    quality:      parseInt(document.getElementById('quality').value) / 100,
  };
}

// ── Core processing (full resolution) ─────────────────────────────────────
// Layer order from inside out:
//   image → inner border (直接写真に密着) → padding (アスペクト比調整) → outer border
function processImage(img, s) {
  const origW = img.naturalWidth;
  const origH = img.naturalHeight;
  const ib = s.innerSize;
  const ob = s.outerSize;

  // 1. Inner border unit: photo + inner border on all four sides
  const innerUnitW = origW + 2 * ib;
  const innerUnitH = origH + 2 * ib;

  // 2. Padded area: aspect ratio applied to the inner unit
  let paddedW = innerUnitW;
  let paddedH = innerUnitH;

  if (s.aspectRatio !== 'original') {
    const [arW, arH] = s.aspectRatio.split(':').map(Number);
    const targetRatio = arW / arH;
    const unitRatio   = innerUnitW / innerUnitH;

    if (unitRatio > targetRatio) {
      // inner unit is wider than target → add top/bottom padding
      paddedW = innerUnitW;
      paddedH = Math.round(innerUnitW / targetRatio);
    } else if (unitRatio < targetRatio) {
      // inner unit is taller than target → add left/right padding
      paddedH = innerUnitH;
      paddedW = Math.round(innerUnitH * targetRatio);
    }
  }

  // 3. Canvas = padded area + outer border on each side
  const canvas = document.createElement('canvas');
  canvas.width  = paddedW + 2 * ob;
  canvas.height = paddedH + 2 * ob;

  const ctx = canvas.getContext('2d');

  // 4. Outer border fills everything
  if (ob > 0) {
    ctx.fillStyle = s.outerColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // 5. Padding background fills padded area (inside outer border)
  ctx.fillStyle = s.paddingColor;
  ctx.fillRect(ob, ob, paddedW, paddedH);

  // 6. Inner border: centered within padded area
  const innerX = ob + Math.floor((paddedW - innerUnitW) / 2);
  const innerY = ob + Math.floor((paddedH - innerUnitH) / 2);
  if (ib > 0) {
    ctx.fillStyle = s.innerColor;
    ctx.fillRect(innerX, innerY, innerUnitW, innerUnitH);
  }

  // 7. Image: centered inside inner border
  ctx.drawImage(img, innerX + ib, innerY + ib);

  return canvas;
}

// ── Preview rendering ──────────────────────────────────────────────────────
function createPreviewDataURL(img, settings, maxPx = 380) {
  const full  = processImage(img, settings);
  const scale = Math.min(1, maxPx / full.width, maxPx / full.height);

  if (scale >= 1) return full.toDataURL('image/jpeg', 0.85);

  const pc = document.createElement('canvas');
  pc.width  = Math.round(full.width  * scale);
  pc.height = Math.round(full.height * scale);
  const ctx = pc.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(full, 0, 0, pc.width, pc.height);
  return pc.toDataURL('image/jpeg', 0.88);
}

// ── Grid rendering ─────────────────────────────────────────────────────────
function renderGrid() {
  const grid       = document.getElementById('photo-grid');
  const emptyState = document.getElementById('empty-state');
  const countEl    = document.getElementById('photo-count');

  if (state.images.length === 0) {
    grid.style.display = 'none';
    emptyState.style.display = 'flex';
    countEl.textContent = '';
    return;
  }

  grid.style.display = 'grid';
  emptyState.style.display = 'none';
  countEl.textContent = `${state.images.length} 枚`;

  const s = getSettings();
  grid.innerHTML = '';

  state.images.forEach((item, idx) => {
    const previewURL = createPreviewDataURL(item.img, s);
    const dimText    = `${item.img.naturalWidth} × ${item.img.naturalHeight} px`;

    const card = document.createElement('div');
    card.className = 'photo-card';
    card.innerHTML = `
      <img class="preview-img" src="${previewURL}" alt="${escapeHtml(item.file.name)}">
      <div class="card-overlay"></div>
      <div class="card-actions">
        <button class="icon-btn" title="ダウンロード" data-action="dl" data-idx="${idx}">&#x2193;</button>
        <button class="icon-btn danger" title="削除" data-action="rm" data-idx="${idx}">&#x2715;</button>
      </div>
      <div class="card-info" title="${escapeHtml(item.file.name)}">
        ${escapeHtml(item.file.name)}<br>
        <span class="dim">${dimText}</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Image loading ──────────────────────────────────────────────────────────
function isTiff(file) {
  return file.type === 'image/tiff' || file.type === 'image/tif' ||
         /\.tiff?$/i.test(file.name);
}

async function addImages(files) {
  const valid = Array.from(files).filter(f =>
    f.type.startsWith('image/') || isTiff(f)
  );
  if (!valid.length) return;

  showProgress(`読み込み中... 0 / ${valid.length}`);

  for (let i = 0; i < valid.length; i++) {
    updateProgress(`読み込み中... ${i + 1} / ${valid.length}`);
    try {
      const img = isTiff(valid[i]) ? await loadTiff(valid[i]) : await loadImage(valid[i]);
      state.images.push({ file: valid[i], img });
    } catch (e) {
      console.error('読み込み失敗:', valid[i].name, e);
    }
    await tick();
  }

  hideProgress();
  renderGrid();
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = reject;
    img.src = url;
  });
}

async function loadTiff(file) {
  const buffer = await file.arrayBuffer();
  const ifds   = UTIF.decode(buffer);
  UTIF.decodeImage(buffer, ifds[0]);
  const ifd  = ifds[0];
  const rgba = UTIF.toRGBA8(ifd);

  const c   = document.createElement('canvas');
  c.width   = ifd.width;
  c.height  = ifd.height;
  const ctx = c.getContext('2d');
  ctx.putImageData(new ImageData(new Uint8ClampedArray(rgba), ifd.width, ifd.height), 0, 0);

  // Wrap the canvas result in an Image so it's handled identically downstream
  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload  = resolve;
    img.onerror = reject;
    img.src = c.toDataURL();
  });
  return img;
}

function tick() { return new Promise(r => setTimeout(r, 0)); }

// ── Single download ────────────────────────────────────────────────────────
async function downloadSingle(idx) {
  const item = state.images[idx];
  const s    = getSettings();
  const canvas = processImage(item.img, s);

  const mimeType = s.format === 'jpeg' ? 'image/jpeg' : 'image/png';
  const ext      = s.format === 'jpeg' ? 'jpg' : 'png';
  const quality  = s.format === 'jpeg' ? s.quality : undefined;

  const blob = await new Promise(r => canvas.toBlob(r, mimeType, quality));
  triggerDownload(blob, baseName(item.file.name) + `_framed.${ext}`);
}

// ── Download all as ZIP ────────────────────────────────────────────────────
async function downloadAll() {
  if (!state.images.length) return;

  showProgress('処理中... 0 / ' + state.images.length);

  const s        = getSettings();
  const mimeType = s.format === 'jpeg' ? 'image/jpeg' : 'image/png';
  const ext      = s.format === 'jpeg' ? 'jpg' : 'png';
  const quality  = s.format === 'jpeg' ? s.quality : undefined;

  const zip = new JSZip();

  for (let i = 0; i < state.images.length; i++) {
    updateProgress(`処理中... ${i + 1} / ${state.images.length}`);
    const item   = state.images[i];
    const canvas = processImage(item.img, s);
    const blob   = await new Promise(r => canvas.toBlob(r, mimeType, quality));
    zip.file(`${baseName(item.file.name)}_framed.${ext}`, blob);
    await tick();
  }

  updateProgress('ZIP を生成中...');
  const zipBlob = await zip.generateAsync({ type: 'blob' });
  hideProgress();
  triggerDownload(zipBlob, 'framed_photos.zip');
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href     = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function baseName(filename) {
  return filename.replace(/\.[^.]+$/, '');
}

// ── Progress helpers ───────────────────────────────────────────────────────
function showProgress(text)   { document.getElementById('progress-overlay').classList.add('active'); updateProgress(text); }
function updateProgress(text) { document.getElementById('progress-text').textContent = text; }
function hideProgress()       { document.getElementById('progress-overlay').classList.remove('active'); }

// ── Sync paired range ↔ number inputs ─────────────────────────────────────
function syncPair(rangeId, numId, labelId) {
  const range = document.getElementById(rangeId);
  const num   = document.getElementById(numId);
  const label = document.getElementById(labelId);

  const update = (val) => {
    range.value = val;
    num.value   = val;
    if (label) label.textContent = val;
  };

  range.addEventListener('input', () => update(range.value));
  num.addEventListener('input',   () => update(num.value));
}

syncPair('inner-size', 'inner-size-num', 'inner-size-label');
syncPair('outer-size', 'outer-size-num', 'outer-size-label');

// ── Color hex labels ───────────────────────────────────────────────────────
['inner-color', 'outer-color', 'padding-color'].forEach(id => {
  const input = document.getElementById(id);
  const span  = document.getElementById(id + '-hex');
  if (span) input.addEventListener('input', () => { span.textContent = input.value; });
});

// ── Format buttons ─────────────────────────────────────────────────────────
document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.format = btn.dataset.fmt;
    document.getElementById('quality-field').style.display = state.format === 'jpeg' ? 'block' : 'none';
  });
});

document.getElementById('quality').addEventListener('input', () => {
  document.getElementById('quality-label').textContent = document.getElementById('quality').value;
});

// ── Upload area ────────────────────────────────────────────────────────────
const uploadArea = document.getElementById('upload-area');
uploadArea.addEventListener('click', () => document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', e => {
  addImages(e.target.files);
  e.target.value = '';
});

uploadArea.addEventListener('dragover',  e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', ()  => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  addImages(e.dataTransfer.files);
});

// Also allow dropping on the content area
const contentEl = document.getElementById('content');
contentEl.addEventListener('dragover', e => e.preventDefault());
contentEl.addEventListener('drop', e => { e.preventDefault(); addImages(e.dataTransfer.files); });

// ── Grid action delegation ─────────────────────────────────────────────────
document.getElementById('photo-grid').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx);
  if (btn.dataset.action === 'dl') downloadSingle(idx);
  if (btn.dataset.action === 'rm') { state.images.splice(idx, 1); renderGrid(); }
});

// ── Toolbar buttons ────────────────────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', renderGrid);
document.getElementById('btn-dl-all').addEventListener('click', downloadAll);
document.getElementById('btn-clear').addEventListener('click', () => {
  if (state.images.length === 0 || confirm('全ての写真をクリアしますか？')) {
    state.images = [];
    renderGrid();
  }
});

// ── Auto preview (debounced) ───────────────────────────────────────────────
let previewTimer;
const schedulePreview = () => {
  clearTimeout(previewTimer);
  if (state.images.length > 0) {
    previewTimer = setTimeout(renderGrid, 600);
  }
};

const watchIds = [
  'aspect-ratio', 'padding-color',
  'inner-color', 'inner-size', 'inner-size-num',
  'outer-color', 'outer-size', 'outer-size-num',
];
watchIds.forEach(id => {
  document.getElementById(id).addEventListener('input',  schedulePreview);
  document.getElementById(id).addEventListener('change', schedulePreview);
});

// ── Init ───────────────────────────────────────────────────────────────────
</script>
</body>
</html>
